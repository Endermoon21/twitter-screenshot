<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Screenshot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 540px;
            margin: 40px auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header p {
            color: #8899a6;
            font-size: 14px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 16px;
            font-size: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #1d9bf0;
            box-shadow: 0 0 0 3px rgba(29, 155, 240, 0.2);
        }

        input[type="text"]::placeholder {
            color: #657786;
        }

        .btn {
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #1d9bf0;
            color: #fff;
        }

        .btn-primary:hover {
            background: #1a8cd8;
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            background: #657786;
            cursor: not-allowed;
            transform: none;
        }

        /* Options row */
        .options-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
        }

        .option-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #1d9bf0;
        }

        /* Theme toggle */
        .theme-toggle {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .theme-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: transparent;
            color: #8899a6;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-btn.active {
            border-color: #1d9bf0;
            background: rgba(29, 155, 240, 0.1);
            color: #1d9bf0;
        }

        /* Width slider */
        .slider-row {
            margin-bottom: 16px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-bottom: 8px;
        }

        .slider-value {
            color: rgba(255, 255, 255, 0.6);
            font-family: 'SF Mono', Monaco, monospace;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1d9bf0, #1a8cd8);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(29, 155, 240, 0.4);
        }

        /* Action buttons */
        .action-buttons {
            display: none;
            gap: 12px;
            margin-top: 16px;
        }

        .action-buttons.visible {
            display: flex;
        }

        .btn-copy, .btn-download {
            flex: 1;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-copy {
            background: linear-gradient(135deg, #1d9bf0, #1a8cd8);
            box-shadow: 0 4px 15px rgba(29, 155, 240, 0.3);
        }

        /* Status messages */
        .status {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
        }

        .status.success {
            display: block;
            background: rgba(0, 186, 124, 0.1);
            border: 1px solid rgba(0, 186, 124, 0.3);
            color: #00ba7c;
        }

        .status.error {
            display: block;
            background: rgba(244, 33, 46, 0.1);
            border: 1px solid rgba(244, 33, 46, 0.3);
            color: #f4212e;
        }

        .status.loading {
            display: block;
            background: rgba(29, 155, 240, 0.1);
            border: 1px solid rgba(29, 155, 240, 0.3);
            color: #1d9bf0;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Preview section */
        .preview-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .placeholder {
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
        }

        /* Result image */
        .result {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .result.show {
            display: flex;
        }

        .result img {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .loading {
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border-width: 3px;
            margin: 0;
        }

        @media (max-width: 480px) {
            .input-group {
                flex-direction: column;
            }

            .options-row {
                gap: 8px;
            }

            .theme-toggle {
                margin-left: 0;
                width: 100%;
                justify-content: center;
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Twitter Screenshot</h1>
            <p>Capture tweets as high-quality images</p>
        </div>

        <div class="card">
            <div class="input-group">
                <input
                    type="text"
                    id="tweetUrl"
                    placeholder="Paste tweet URL here..."
                    autocomplete="off"
                >
                <button class="btn btn-primary" id="captureBtn" onclick="captureTweet()">
                    Capture
                </button>
            </div>

            <div class="options-row">
                <label class="option-label">
                    <input type="checkbox" id="hideMetrics">
                    Hide Metrics
                </label>
                <div class="theme-toggle">
                    <button class="theme-btn" id="themeLight" onclick="setTheme('light')">Light</button>
                    <button class="theme-btn active" id="themeDark" onclick="setTheme('dark')">Dark</button>
                </div>
            </div>

            <div class="slider-row">
                <div class="slider-label">
                    <span>Screenshot Width</span>
                    <span class="slider-value" id="widthValue">600px</span>
                </div>
                <input type="range" id="widthSlider" min="400" max="800" value="600" step="20">
            </div>

            <div class="status" id="status"></div>

            <div class="action-buttons" id="actionButtons">
                <button class="btn btn-copy" id="copyBtn" onclick="copyImage()">Copy Image</button>
                <button class="btn btn-download" id="downloadBtn" onclick="downloadImage()">Download</button>
            </div>
        </div>

        <div class="preview-section" id="preview">
            <p class="placeholder">Your tweet screenshot will appear here</p>
        </div>
    </div>

    <script>
        let currentTheme = 'dark';
        let currentFilename = '';
        let currentImageUrl = '';
        let screenshotWidth = 600;

        function setTheme(theme) {
            currentTheme = theme;
            document.getElementById('themeLight').classList.toggle('active', theme === 'light');
            document.getElementById('themeDark').classList.toggle('active', theme === 'dark');
        }

        // Width slider
        document.getElementById('widthSlider').addEventListener('input', function(e) {
            screenshotWidth = parseInt(e.target.value);
            document.getElementById('widthValue').textContent = screenshotWidth + 'px';
        });

        async function captureTweet() {
            const url = document.getElementById('tweetUrl').value.trim();
            const hideMetrics = document.getElementById('hideMetrics').checked;
            const btn = document.getElementById('captureBtn');
            const statusEl = document.getElementById('status');
            const preview = document.getElementById('preview');
            const actionButtons = document.getElementById('actionButtons');

            if (!url) {
                showStatus('error', 'Please enter a tweet URL');
                return;
            }

            if (!url.match(/(?:twitter\.com|x\.com)\/\w+\/status\/\d+/)) {
                showStatus('error', 'Invalid URL format. Use a Twitter/X status URL.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>';
            showStatus('loading', '<span class="spinner"></span> Capturing tweet...');
            actionButtons.classList.remove('visible');
            preview.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <span>Loading tweet...</span>
                </div>
            `;

            try {
                const response = await fetch('/api/capture', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url,
                        theme: currentTheme,
                        hide_metrics: hideMetrics,
                        width: screenshotWidth
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('success', 'Screenshot captured!');
                    currentFilename = data.filename;
                    currentImageUrl = '/screenshots/' + data.filename;

                    preview.innerHTML = `
                        <div class="result show">
                            <img id="resultImage" src="${currentImageUrl}" alt="Tweet screenshot">
                        </div>
                    `;
                    actionButtons.classList.add('visible');
                } else {
                    showStatus('error', data.error || 'Failed to capture tweet');
                    preview.innerHTML = '<p class="placeholder">Capture failed. Try again.</p>';
                }
            } catch (e) {
                showStatus('error', 'Network error: ' + e.message);
                preview.innerHTML = '<p class="placeholder">Network error occurred.</p>';
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Capture';
            }
        }

        async function copyImage() {
            const copyBtn = document.getElementById('copyBtn');
            const originalText = copyBtn.textContent;

            try {
                copyBtn.textContent = 'Copying...';
                copyBtn.disabled = true;

                const response = await fetch(currentImageUrl);
                const blob = await response.blob();

                await navigator.clipboard.write([
                    new ClipboardItem({
                        'image/png': blob
                    })
                ]);

                showStatus('success', 'Image copied to clipboard!');
            } catch (e) {
                showStatus('error', 'Could not copy image: ' + e.message);
            } finally {
                copyBtn.textContent = originalText;
                copyBtn.disabled = false;
            }
        }

        function downloadImage() {
            if (!currentImageUrl) return;

            const link = document.createElement('a');
            link.href = '/api/download/' + currentFilename;
            link.download = currentFilename;
            link.click();

            showStatus('success', 'Download started!');
        }

        function showStatus(type, message) {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status ' + type;
            statusEl.innerHTML = message;

            if (type === 'success') {
                setTimeout(() => {
                    statusEl.className = 'status';
                }, 3000);
            }
        }

        // Auto-capture on paste
        document.getElementById('tweetUrl').addEventListener('paste', function(e) {
            setTimeout(() => {
                if (this.value.trim()) {
                    captureTweet();
                }
            }, 100);
        });

        // Enter key to capture
        document.getElementById('tweetUrl').addEventListener('keypress', e => {
            if (e.key === 'Enter') captureTweet();
        });
    </script>
</body>
</html>
