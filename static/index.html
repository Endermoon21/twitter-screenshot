<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Screenshot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 460px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header h1 .icon {
            font-size: 28px;
        }

        .header p {
            color: #8899a6;
            font-size: 14px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #8899a6;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input[type="text"]:focus {
            outline: none;
            border-color: #1d9bf0;
            box-shadow: 0 0 0 3px rgba(29, 155, 240, 0.2);
        }

        .input-group input[type="text"]::placeholder {
            color: #657786;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #1d9bf0;
            color: #fff;
        }

        .btn-primary:hover {
            background: #1a8cd8;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: #657786;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .settings-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .settings-section h3 {
            font-size: 13px;
            font-weight: 600;
            color: #8899a6;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
        }

        .setting-row label {
            font-size: 14px;
            color: #e7e9ea;
        }

        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #657786;
            transition: 0.3s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        .toggle input:checked + .toggle-slider {
            background-color: #1d9bf0;
        }

        .toggle input:checked + .toggle-slider:before {
            transform: translateX(20px);
        }

        .theme-toggle {
            display: flex;
            gap: 8px;
        }

        .theme-btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: transparent;
            color: #8899a6;
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-btn.active {
            border-color: #1d9bf0;
            background: rgba(29, 155, 240, 0.1);
            color: #1d9bf0;
        }

        .theme-btn:hover:not(.active) {
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        .directory-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .directory-path {
            flex: 1;
            padding: 10px 14px;
            font-size: 13px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            color: #8899a6;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn-small {
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-small:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .status {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            display: none;
        }

        .status.success {
            display: block;
            background: rgba(0, 186, 124, 0.1);
            border: 1px solid rgba(0, 186, 124, 0.3);
            color: #00ba7c;
        }

        .status.error {
            display: block;
            background: rgba(244, 33, 46, 0.1);
            border: 1px solid rgba(244, 33, 46, 0.3);
            color: #f4212e;
        }

        .status.loading {
            display: block;
            background: rgba(29, 155, 240, 0.1);
            border: 1px solid rgba(29, 155, 240, 0.3);
            color: #1d9bf0;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .filepath {
            margin-top: 8px;
            font-size: 12px;
            color: #8899a6;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><span class="icon">𝕏</span> Twitter Screenshot</h1>
            <p>Capture tweets as high-quality images</p>
        </div>

        <div class="card">
            <div class="input-group">
                <label>Tweet URL</label>
                <input
                    type="text"
                    id="tweetUrl"
                    placeholder="https://twitter.com/user/status/123456789"
                    autocomplete="off"
                >
            </div>

            <button class="btn btn-primary" id="captureBtn" onclick="captureTweet()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M4 4h7V2H4c-1.1 0-2 .9-2 2v7h2V4zm6 9l-4 5h3v4h2v-4h3l-4-5zm6-6V4h-2v3H4v2h10v3l4-5-4-5zm4 2h-2v7c0 1.1-.9 2-2 2h-7v2h7c2.2 0 4-1.8 4-4V9z"/>
                </svg>
                Capture Tweet
            </button>

            <div class="status" id="status"></div>

            <div class="settings-section">
                <h3>Settings</h3>

                <div class="setting-row">
                    <label>Screenshot Theme</label>
                    <div class="theme-toggle">
                        <button class="theme-btn" id="themeLight" onclick="setTheme('light')">Light</button>
                        <button class="theme-btn active" id="themeDark" onclick="setTheme('dark')">Dark</button>
                    </div>
                </div>

                <div class="setting-row">
                    <label>Hide Engagement Metrics</label>
                    <label class="toggle">
                        <input type="checkbox" id="hideMetrics" onchange="updateSettings()">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="setting-row" style="flex-direction: column; align-items: flex-start; gap: 10px;">
                    <label>Save Location</label>
                    <div class="directory-row" style="width: 100%;">
                        <div class="directory-path" id="saveDirectory">~/Downloads</div>
                        <button class="btn-small" onclick="selectDirectory()">Browse</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTheme = 'dark';

        // Initialize on load
        window.addEventListener('pywebviewready', async function() {
            const settings = await pywebview.api.get_settings();
            currentTheme = settings.theme;
            document.getElementById('hideMetrics').checked = settings.hide_metrics;
            document.getElementById('saveDirectory').textContent = settings.save_directory;
            updateThemeButtons();
        });

        function updateThemeButtons() {
            document.getElementById('themeLight').classList.toggle('active', currentTheme === 'light');
            document.getElementById('themeDark').classList.toggle('active', currentTheme === 'dark');
        }

        async function setTheme(theme) {
            currentTheme = theme;
            updateThemeButtons();
            await pywebview.api.update_settings({ theme: theme });
        }

        async function updateSettings() {
            const hideMetrics = document.getElementById('hideMetrics').checked;
            await pywebview.api.update_settings({ hide_metrics: hideMetrics });
        }

        async function selectDirectory() {
            const result = await pywebview.api.select_directory();
            if (result.success) {
                document.getElementById('saveDirectory').textContent = result.directory;
            }
        }

        async function captureTweet() {
            const url = document.getElementById('tweetUrl').value.trim();
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('captureBtn');

            if (!url) {
                showStatus('error', 'Please enter a tweet URL');
                return;
            }

            // Validate URL format
            if (!url.match(/(?:twitter\.com|x\.com)\/\w+\/status\/\d+/)) {
                showStatus('error', 'Invalid URL format. Please use a Twitter/X status URL.');
                return;
            }

            // Show loading state
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Capturing...';
            showStatus('loading', '<span class="spinner"></span> Capturing tweet... This may take a few seconds.');

            try {
                const result = await pywebview.api.capture_tweet(url);

                if (result.success) {
                    showStatus('success',
                        `Screenshot saved successfully!<div class="filepath">${result.filepath}</div>`
                    );
                    // Clear input
                    document.getElementById('tweetUrl').value = '';
                } else {
                    showStatus('error', result.error);
                }
            } catch (e) {
                showStatus('error', 'An unexpected error occurred: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M4 4h7V2H4c-1.1 0-2 .9-2 2v7h2V4zm6 9l-4 5h3v4h2v-4h3l-4-5zm6-6V4h-2v3H4v2h10v3l4-5-4-5zm4 2h-2v7c0 1.1-.9 2-2 2h-7v2h7c2.2 0 4-1.8 4-4V9z"/>
                    </svg>
                    Capture Tweet
                `;
            }
        }

        function showStatus(type, message) {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status ' + type;
            statusEl.innerHTML = message;
        }

        // Handle Enter key
        document.getElementById('tweetUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                captureTweet();
            }
        });
    </script>
</body>
</html>
